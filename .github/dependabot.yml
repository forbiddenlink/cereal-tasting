# Dependabot config — npm ecosystem. Grouped patch/minor to reduce PR spam. Fleet-standard.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      patch-and-minor:
        update-types: ["patch", "minor"]
        exclude-patterns: ["next", "react", "react-dom", "typescript"]
      major-frameworks:
        patterns: ["next", "react", "react-dom", "typescript"]
        update-types: ["major"]
    labels: ["dependencies"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns: ["*"]
    labels: ["dependencies", "github-actions"]
